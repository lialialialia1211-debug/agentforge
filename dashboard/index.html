<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeMud — World Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0e14; --bg2: #111820; --border: #1a1f2b;
      --orange: #f0883e; --blue: #58a6ff; --red: #f85149;
      --green: #3fb950; --gold: #e3b341; --purple: #d2a8ff;
      --cyan: #39d2c0; --gray: #484f58; --text: #8b949e;
      --font: 'SF Mono', Consolas, 'Courier New', monospace;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 12px; min-width: 1024px; min-height: 100vh; overflow-x: hidden; }
    .app { display: flex; flex-direction: column; height: 100vh; }

    /* HEADER */
    .header { display: flex; align-items: center; justify-content: space-between; padding: 10px 18px; border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0; z-index: 10; }
    .header-left { display: flex; align-items: baseline; gap: 10px; }
    .brand { font-size: 18px; font-weight: 700; color: var(--orange); letter-spacing: 3px; text-shadow: 0 0 18px rgba(240,136,62,0.5); }
    .brand-sub { font-size: 10px; color: var(--cyan); letter-spacing: 1.5px; opacity: 0.85; }
    .header-right { display: flex; align-items: center; gap: 18px; }
    .tick-counter { font-size: 11px; color: var(--text); }
    .tick-counter span { color: var(--orange); font-weight: 700; }
    .agent-count-header { font-size: 11px; color: var(--text); }
    .agent-count-header span { color: var(--blue); font-weight: 700; }
    .btn-spectate { font-size: 10px; font-weight: 700; font-family: var(--font); letter-spacing: 1.5px; color: var(--cyan); background: rgba(57,210,192,0.1); border: 1px solid rgba(57,210,192,0.35); padding: 4px 10px; border-radius: 3px; cursor: pointer; transition: background 0.15s, box-shadow 0.15s; }
    .btn-spectate:hover { background: rgba(57,210,192,0.18); box-shadow: 0 0 10px rgba(57,210,192,0.25); }
    .live-badge { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700; color: var(--green); letter-spacing: 1.5px; }
    .live-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }

    /* STATS BAR */
    .stats-bar { display: grid; grid-template-columns: repeat(4,1fr); border-bottom: 1px solid var(--border); flex-shrink: 0; transition: max-height 0.3s, opacity 0.3s; }
    .stat-card { padding: 10px 18px; border-right: 1px solid var(--border); }
    .stat-card:last-child { border-right: none; }
    .stat-label { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 1.8px; margin-bottom: 4px; }
    .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: 10px; color: var(--text); margin-top: 3px; }

    /* LAYOUT */
    .main-body { display: grid; grid-template-columns: 1fr 310px; flex: 1; min-height: 0; overflow: hidden; transition: grid-template-columns 0.3s; }
    .left-col { display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; min-height: 0; }
    .map-wrapper { flex: 1; min-height: 0; position: relative; background: #070b10; overflow: hidden; }
    .map-wrapper svg { width: 100%; height: 100%; display: block; }

    /* SIDE PANEL */
    .side-panel { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); transition: width 0.3s; }
    .side-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .side-title { font-size: 9px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1.8px; }
    .back-link { font-size: 10px; color: var(--blue); cursor: pointer; opacity: 0.8; transition: opacity 0.15s; }
    .back-link:hover { opacity: 1; }
    .side-body { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .side-body::-webkit-scrollbar { width: 3px; }
    .side-body::-webkit-scrollbar-thumb { background: var(--border); }

    /* AGENT CARDS */
    .agent-card { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; }
    .agent-card:hover { background: rgba(88,166,255,0.04); }
    .agent-card.combat { border-left: 2px solid var(--red); }
    .agent-card.idle   { border-left: 2px solid var(--green); }
    .agent-card-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 12px 2px; }
    .agent-name { font-size: 13px; font-weight: 700; color: #c9d1d9; }
    .agent-lv { font-size: 10px; color: var(--text); }
    .agent-meta { font-size: 10px; color: var(--text); padding: 0 12px 2px; }
    .status-badge { font-size: 9px; font-weight: 700; padding: 2px 6px; border-radius: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .status-combat    { background: rgba(248,81,73,0.15); color: var(--red); }
    .status-idle      { background: rgba(63,185,80,0.12);  color: var(--green); }
    .status-traveling { background: rgba(88,166,255,0.12); color: var(--blue); }
    .status-dead      { background: rgba(72,79,88,0.2);    color: var(--gray); }
    .hp-bar-wrap { margin: 4px 12px 3px; }
    .hp-bar-bg { background: var(--border); border-radius: 2px; height: 4px; overflow: hidden; }
    .hp-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
    .hp-bar-label { display: flex; justify-content: space-between; font-size: 9px; color: var(--text); margin-top: 2px; }
    .energy-bar-fill { height: 100%; border-radius: 1px; transition: width 0.5s ease; }
    .agent-energy-row { display: flex; align-items: center; }

    /* AGENT EXPANDED */
    .agent-expand { padding: 6px 12px 10px; background: rgba(255,255,255,0.015); border-top: 1px solid var(--border); }
    .expand-section { margin-bottom: 8px; }
    .expand-title { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
    .equip-row { display: flex; align-items: center; gap: 6px; font-size: 10px; margin-bottom: 3px; }
    .equip-slot { font-size: 9px; color: var(--gray); width: 38px; flex-shrink: 0; }
    .rarity-white  { color: #c9d1d9; }
    .rarity-green  { color: var(--green); }
    .rarity-blue   { color: var(--blue); }
    .rarity-purple { color: var(--purple); text-shadow: 0 0 8px rgba(210,168,255,0.4); }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 3px; }
    .stat-cell { background: var(--border); border-radius: 2px; padding: 3px 6px; text-align: center; }
    .stat-key { font-size: 8px; color: var(--text); text-transform: uppercase; display: block; }
    .stat-val { font-size: 13px; font-weight: 700; color: #c9d1d9; }
    .buff-list { display: flex; flex-wrap: wrap; gap: 4px; }
    .buff-tag { font-size: 9px; padding: 2px 6px; background: rgba(227,179,65,0.12); color: var(--gold); border-radius: 2px; border: 1px solid rgba(227,179,65,0.2); }
    .gold-row { display: flex; gap: 12px; font-size: 10px; margin-top: 4px; }
    .gold-val { color: var(--gold); font-weight: 700; }
    .atk-val  { color: var(--red); font-weight: 700; }
    .def-val  { color: var(--blue); font-weight: 700; }
    .btn-watch { width: 100%; margin-top: 8px; padding: 6px; font-family: var(--font); font-size: 10px; font-weight: 700; color: var(--orange); background: rgba(240,136,62,0.1); border: 1px solid rgba(240,136,62,0.3); border-radius: 3px; cursor: pointer; letter-spacing: 1px; transition: background 0.15s; }
    .btn-watch:hover { background: rgba(240,136,62,0.2); }

    /* LOCATION PANEL */
    .loc-panel { padding: 10px 12px; }
    .loc-panel-name { font-size: 15px; font-weight: 700; color: #c9d1d9; margin-bottom: 2px; }
    .loc-panel-meta { font-size: 10px; color: var(--text); margin-bottom: 6px; }
    .loc-panel-desc { font-size: 10px; color: var(--text); line-height: 1.6; margin-bottom: 10px; border-left: 2px solid var(--border); padding-left: 8px; }
    .loc-section-title { font-size: 9px; color: var(--text); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 5px; padding-bottom: 2px; border-bottom: 1px solid var(--border); }
    .monster-row { display: flex; flex-direction: column; margin-bottom: 6px; }
    .monster-name-row { display: flex; justify-content: space-between; font-size: 10px; color: #c9d1d9; margin-bottom: 2px; }
    .monster-lv { color: var(--text); }
    .exit-btn { display: inline-block; margin: 3px 4px 0 0; font-size: 10px; color: var(--blue); cursor: pointer; padding: 2px 7px; border: 1px solid rgba(88,166,255,0.25); border-radius: 2px; background: rgba(88,166,255,0.06); }
    .exit-btn:hover { background: rgba(88,166,255,0.12); }

    /* BATTLE PANEL */
    .battle-panel { display: flex; flex-direction: column; height: 100%; padding: 0; }
    .battle-combatant { padding: 10px 14px; }
    .combatant-name { font-size: 14px; font-weight: 700; color: #c9d1d9; }
    .combatant-meta { font-size: 10px; color: var(--text); margin-bottom: 5px; }
    .combatant-hp-bar { height: 8px; border-radius: 3px; background: var(--border); overflow: hidden; margin-bottom: 3px; }
    .combatant-hp-fill { height: 100%; border-radius: 3px; transition: width 0.7s ease; }
    .combatant-hp-nums { font-size: 10px; color: var(--text); }
    .battle-vs { text-align: center; padding: 6px; font-size: 13px; font-weight: 700; color: var(--orange); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); letter-spacing: 3px; }
    .agent-combat-stats { display: flex; gap: 10px; margin-top: 5px; font-size: 10px; }
    .battle-log { flex: 1; overflow-y: auto; padding: 6px 10px; scrollbar-width: thin; scrollbar-color: var(--border) transparent; min-height: 0; }
    .battle-log::-webkit-scrollbar { width: 3px; }
    .battle-log::-webkit-scrollbar-thumb { background: var(--border); }
    .log-row { font-size: 10px; padding: 2px 0; border-bottom: 1px solid rgba(26,31,43,0.5); line-height: 1.5; }
    .log-dmg-agent   { font-weight: 700; }
    .log-dmg-monster { font-weight: 700; }
    .battle-result { text-align: center; padding: 14px; font-size: 20px; font-weight: 700; letter-spacing: 3px; }
    .result-victory  { color: var(--gold); text-shadow: 0 0 20px rgba(227,179,65,0.7); }
    .result-defeated { color: var(--red); text-shadow: 0 0 20px rgba(248,81,73,0.7); }
    .battle-shake { animation: shake 0.3s ease; }

    /* EVENT FEED */
    .event-feed { height: 160px; border-top: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; transition: all 0.3s; }
    .feed-header { padding: 5px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 8px; }
    .feed-title { font-size: 9px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1.8px; }
    .feed-list { flex: 1; overflow-y: auto; scrollbar-width: none; display: flex; flex-direction: column; }
    .feed-list::-webkit-scrollbar { display: none; }
    .feed-row { display: flex; align-items: baseline; gap: 8px; padding: 3px 14px; border-bottom: 1px solid rgba(26,31,43,0.4); font-size: 11px; flex-shrink: 0; }
    .feed-time { font-size: 10px; color: var(--gray); flex-shrink: 0; white-space: nowrap; }
    .feed-badge { font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px; flex-shrink: 0; text-transform: uppercase; letter-spacing: 0.5px; }
    .feed-msg { color: var(--text); flex: 1; }
    .badge-combat  { background: rgba(248,81,73,0.15);  color: var(--red); }
    .badge-loot    { background: rgba(227,179,65,0.15);  color: var(--gold); }
    .badge-move    { background: rgba(88,166,255,0.15);  color: var(--blue); }
    .badge-death   { background: rgba(218,54,51,0.15);   color: #f85149; }
    .badge-levelup { background: rgba(210,168,255,0.15); color: var(--purple); }
    .badge-dev     { background: rgba(57,210,192,0.15);  color: var(--cyan); }
    .badge-buff    { background: rgba(227,179,65,0.15);  color: var(--gold); }
    .badge-shop    { background: rgba(63,185,80,0.15);   color: var(--green); }
    .badge-skill   { background: rgba(240,136,62,0.15);  color: var(--orange); }
    .badge-pvp     { background: rgba(248,81,73,0.2);    color: var(--red); }
    .badge-default { background: rgba(72,79,88,0.3);     color: var(--text); }
    .badge-energy  { background: #39d2c015; color: #39d2c0; }
    .feed-row.flash-levelup { background: rgba(227,179,65,0.06); }
    .feed-row.flash-death   { background: rgba(248,81,73,0.06); }
    .feed-row.rare-loot { border: 1px solid rgba(88,166,255,0.35); box-shadow: 0 0 8px rgba(88,166,255,0.12); }

    /* SPECTATE MODE */
    .app.spectate .stats-bar { max-height: 0; overflow: hidden; opacity: 0; border: none; }
    .app.spectate .main-body { grid-template-columns: 1fr 0px; }
    .app.spectate .side-panel { display: none; }
    .app.spectate .left-col { border-right: none; }
    .app.spectate .event-feed { position: fixed; bottom: 0; left: 0; right: 0; height: 120px; background: rgba(7,11,16,0.88); z-index: 100; border-top: 1px solid var(--border); }
    .spectate-label { display: none; position: fixed; top: 14px; right: 18px; font-size: 10px; font-weight: 700; color: var(--cyan); letter-spacing: 2px; background: rgba(57,210,192,0.08); border: 1px solid rgba(57,210,192,0.3); padding: 4px 10px; border-radius: 3px; z-index: 200; }
    .app.spectate .spectate-label { display: block; }

    /* HP COLORS */
    .hp-high   { background: var(--green); }
    .hp-mid    { background: var(--gold); }
    .hp-low    { background: var(--red); }

    /* ANIMATIONS */
    @media (prefers-reduced-motion: no-preference) {
      .live-dot { animation: pulseDot 1.5s ease-in-out infinite; }
      @keyframes pulseDot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.75)} }

      @keyframes shake {
        0%,100%{transform:translateX(0)}
        20%{transform:translateX(-4px)}
        40%{transform:translateX(4px)}
        60%{transform:translateX(-4px)}
        80%{transform:translateX(4px)}
      }

      @keyframes slideIn {
        from{transform:translateY(10px);opacity:0}
        to{transform:translateY(0);opacity:1}
      }
      .feed-row.new-event { animation: slideIn 0.3s ease; }

      @keyframes hpFlashAnim { 0%,100%{opacity:1} 50%{opacity:0.4} }
      .hp-crit { animation: hpFlashAnim 0.5s ease infinite; }

      @keyframes dashFlow { to { stroke-dashoffset: -20; } }

      @keyframes pulseRing {
        0%   { r: 12; opacity: 0.6; }
        100% { r: 22; opacity: 0; }
      }

      @keyframes combatAura {
        0%,100% { r: 12; opacity: 0.5; stroke: var(--orange); }
        50%     { r: 18; opacity: 0.15; stroke: var(--orange); }
      }

      @keyframes burstCircle {
        0%   { r: 5; opacity: 0.9; }
        100% { r: 38; opacity: 0; }
      }

      @keyframes floatUp {
        0%   { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-32px); opacity: 0; }
      }

      @keyframes trailFade {
        0%   { opacity: 0.6; }
        100% { opacity: 0; }
      }

      @keyframes flashBorder {
        0%,100% { opacity: 1; }
        50%      { opacity: 0; }
      }
    }

    /* VIEW TABS */
    .view-tabs { display: flex; gap: 0; }
    .view-tab { font-size: 9px; font-weight: 700; font-family: var(--font); letter-spacing: 1.5px; color: var(--text); background: transparent; border: 1px solid var(--border); padding: 4px 10px; cursor: pointer; transition: all 0.15s; }
    .view-tab:first-child { border-radius: 3px 0 0 3px; }
    .view-tab:last-child { border-radius: 0 3px 3px 0; }
    .view-tab + .view-tab { border-left: none; }
    .view-tab.active { color: var(--orange); background: rgba(240,136,62,0.1); border-color: rgba(240,136,62,0.35); }
    .view-tab:hover:not(.active) { background: rgba(255,255,255,0.03); }

    /* ROOM VIEW */
    .room-view { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
    .room-view.visible { display: flex; }
    .room-canvas-wrap { flex: 1; min-height: 0; position: relative; background: #070b10; overflow: hidden; }
    .room-canvas-wrap canvas { display: block; width: 100%; height: 100%; }
    .room-selector { position: absolute; top: 8px; left: 8px; z-index: 5; }
    .room-select { font-family: var(--font); font-size: 10px; color: var(--text); background: rgba(17,24,32,0.9); border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; cursor: pointer; outline: none; }
    .room-select option { background: var(--bg2); color: var(--text); }
    .room-bottom { display: grid; grid-template-columns: 1fr 1fr; height: 140px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .room-events { border-right: 1px solid var(--border); overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .room-events::-webkit-scrollbar { width: 3px; }
    .room-events::-webkit-scrollbar-thumb { background: var(--border); }
    .room-events-header { padding: 5px 10px; border-bottom: 1px solid var(--border); font-size: 9px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1.5px; }
    .room-event-row { font-size: 10px; color: var(--text); padding: 2px 10px; border-bottom: 1px solid rgba(26,31,43,0.4); }
    .room-nearby { overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .room-nearby::-webkit-scrollbar { width: 3px; }
    .room-nearby::-webkit-scrollbar-thumb { background: var(--border); }
    .room-nearby-header { padding: 5px 10px; border-bottom: 1px solid var(--border); font-size: 9px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 1.5px; }
    .room-entity-row { display: flex; align-items: center; justify-content: space-between; padding: 3px 10px; border-bottom: 1px solid rgba(26,31,43,0.4); font-size: 10px; }
    .room-entity-name { color: #c9d1d9; }
    .room-entity-info { color: var(--text); font-size: 9px; }

    /* ROOM ACTIVE */
    .main-body.room-active { grid-template-columns: 1fr; }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <span class="brand">CODEMUD</span>
      <span class="brand-sub">Write code. Get stronger.</span>
    </div>
    <div class="header-right">
      <span class="tick-counter">TICK <span id="tickNum">0</span></span>
      <span class="agent-count-header">AGENTS <span id="headerAgentCount">0</span></span>
      <div class="view-tabs">
        <button class="view-tab active" id="tabWorldMap" onclick="switchDashboardView('worldmap')">WORLD MAP</button>
        <button class="view-tab" id="tabRoom" onclick="switchDashboardView('room')">ROOM VIEW</button>
        <button class="view-tab" id="tabSpectate" onclick="switchDashboardView('spectate')">SPECTATE</button>
      </div>
      <span class="live-badge"><span class="live-dot"></span>LIVE</span>
    </div>
  </div>
  <div class="spectate-label">SPECTATE MODE</div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card">
      <div class="stat-label">Agents Online</div>
      <div class="stat-value" id="statAgents" style="color:var(--blue)">—</div>
      <div class="stat-sub" id="statAgentsSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Monsters</div>
      <div class="stat-value" id="statMonsters" style="color:var(--red)">—</div>
      <div class="stat-sub" id="statMonstersSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Kills</div>
      <div class="stat-value" id="statKills" style="color:var(--gold)">—</div>
      <div class="stat-sub" id="statKillsSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Highest Level</div>
      <div class="stat-value" id="statHighLevel" style="color:var(--purple)">—</div>
      <div class="stat-sub" id="statHighLevelSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">World Energy</div>
      <div class="stat-value" id="statWorldEnergy" style="color:#39d2c0">—</div>
      <div class="stat-sub" id="statWorldEnergySub"></div>
    </div>
  </div>

  <!-- Main Body -->
  <div class="main-body" id="mainBody">
    <!-- Left Column -->
    <div class="left-col" id="leftCol">
      <div class="map-wrapper" id="mapWrapper">
        <svg id="worldMap" xmlns="http://www.w3.org/2000/svg"></svg>
      </div>
      <!-- Event Feed -->
      <div class="event-feed">
        <div class="feed-header">
          <span class="feed-title">Event Log</span>
        </div>
        <div class="feed-list" id="feedList"></div>
      </div>
    </div>

    <!-- Room View -->
    <div class="room-view" id="roomView">
      <div class="room-canvas-wrap" id="roomCanvasWrap">
        <canvas id="roomCanvas"></canvas>
        <div class="room-selector">
          <select class="room-select" id="roomSelect">
            <option value="spawn_terminal">The Terminal</option>
            <option value="npm_commons">NPM Commons</option>
            <option value="pypi_shores">PyPI Shores</option>
            <option value="crates_peaks">Crates Peaks</option>
            <option value="maven_depths">Maven Depths</option>
            <option value="package_bazaar">Package Bazaar</option>
          </select>
        </div>
      </div>
      <div class="room-bottom">
        <div class="room-events" id="roomEvents">
          <div class="room-events-header">Event Feed</div>
        </div>
        <div class="room-nearby" id="roomNearby">
          <div class="room-nearby-header">Nearby</div>
        </div>
      </div>
    </div>

    <!-- Side Panel -->
    <div class="side-panel" id="sidePanel">
      <div class="side-header">
        <span class="side-title" id="sideTitle">Agents</span>
        <span class="back-link" id="backLink" style="display:none">← Back</span>
      </div>
      <div class="side-body" id="sideBody"></div>
    </div>
  </div>
</div>

<script src="room/sprites.js"></script>
<script src="room/effects.js"></script>
<script src="room/scenes.js"></script>
<script src="room/camera.js"></script>
<script src="room/room-engine.js"></script>

<script>
(function() {
'use strict';

/* ===== CONFIG ===== */
var LOC_CENTERS = {
  spawn_terminal:  { x: 280, y: 55  },
  npm_commons:     { x: 100, y: 160 },
  pypi_shores:     { x: 280, y: 250 },
  crates_peaks:    { x: 460, y: 100 },
  maven_depths:    { x: 460, y: 250 },
  package_bazaar:  { x: 280, y: 155 }
};
var LOC_META = {
  spawn_terminal:  { name:'The Terminal',    type:'town', color:'#1f6feb' },
  npm_commons:     { name:'NPM Commons',     type:'wild', color:'#f0883e' },
  pypi_shores:     { name:'PyPI Shores',     type:'wild', color:'#f0883e' },
  crates_peaks:    { name:'Crates Peaks',    type:'wild', color:'#da3633' },
  maven_depths:    { name:'Maven Depths',    type:'wild', color:'#8b2020' },
  package_bazaar:  { name:'Package Bazaar',  type:'town', color:'#e3b341' }
};
var CONNECTIONS = [
  ['spawn_terminal','npm_commons'], ['spawn_terminal','pypi_shores'],
  ['npm_commons','pypi_shores'],    ['npm_commons','crates_peaks'],
  ['npm_commons','package_bazaar'],['pypi_shores','package_bazaar'],
  ['pypi_shores','maven_depths'],  ['crates_peaks','maven_depths']
];
var CLASS_CONFIG = {
  Assassin:  { abbr:'A', color:'#58a6ff' },
  Mage:      { abbr:'M', color:'#d2a8ff' },
  Warrior:   { abbr:'W', color:'#f85149' },
  Ranger:    { abbr:'R', color:'#3fb950' },
  Paladin:   { abbr:'P', color:'#e3b341' },
  Berserker: { abbr:'B', color:'#f85149' },
  Bard:      { abbr:'D', color:'#d2a8ff' },
  Sage:      { abbr:'S', color:'#8b949e' },
  Novice:    { abbr:'N', color:'#8b949e' }
};

/* ===== STATE ===== */
var state = { agents:[], locations:{}, stats:{}, battles:[], tick:0 };
var feedItems = [];
var seenEventIds = new Set();
var prevAgentLocs = {};
var prevBattleRounds = {};
var viewMode = 'agents';
var selectedLocation = null;
var selectedBattleAgent = null;
var spectateMode = false;
var trackedAgent = null;
var expandedAgent = null;

/* agent movement animation state */
var movingAgents = {};   /* name → { fromX, fromY, toX, toY, startTime } */
var trailLines = [];     /* { x1,y1,x2,y2, startTime } */
var attackFlashes = [];  /* { x,y, startTime } */
var damageFloats = [];   /* { x,y,text,color,startTime } */
var victoryBursts = [];  /* { x,y,startTime } */

/* ===== SVG NAMESPACE ===== */
var SVG_NS = 'http://www.w3.org/2000/svg';
function svgEl(tag) { return document.createElementNS(SVG_NS, tag); }

/* ===== HELPERS ===== */
function hpColor(pct) {
  if (pct > 0.5) return '#3fb950';
  if (pct > 0.25) return '#e3b341';
  return '#f85149';
}

function getAgentPos(locId, index, total) {
  var c = LOC_CENTERS[locId];
  if (!c) return { x: 0, y: 0 };
  if (total <= 1) return { x: c.x + 30, y: c.y - 5 };
  var angle = (Math.PI * 2 * index / total) - Math.PI / 2;
  return { x: c.x + Math.cos(angle) * 30 + 15, y: c.y + Math.sin(angle) * 25 };
}

function rarityClass(r) {
  var m = { white:'rarity-white', green:'rarity-green', blue:'rarity-blue', purple:'rarity-purple' };
  return m[r] || 'rarity-white';
}

function classInfo(cls) {
  return CLASS_CONFIG[cls] || { abbr: (cls||'?').charAt(0).toUpperCase(), color: '#8b949e' };
}

/* ===== DATA UPDATE ===== */
function updateState(raw) {
  var d = raw.data || raw;

  /* detect movement */
  var newLocs = {};

  state.agents = (d.agents || []).map(function(a) {
    a.location = a.location_id;
    return a;
  });

  state.agents.forEach(function(a) {
    newLocs[a.name] = a.location;
    if (prevAgentLocs[a.name] && prevAgentLocs[a.name] !== a.location) {
      triggerMove(a.name, prevAgentLocs[a.name], a.location);
    }
  });
  prevAgentLocs = newLocs;

  /* locations */
  var locs = {};
  (d.locations || []).forEach(function(l) { locs[l.id] = l; });
  state.locations = locs;

  state.stats = d.world_stats || {};

  /* detect new battle rounds */
  var battles = d.active_battles || [];
  battles.forEach(function(b) {
    var prev = prevBattleRounds[b.battle_id] || 0;
    var cur  = (b.rounds || []).length;
    if (cur > prev) {
      var newRounds = (b.rounds || []).slice(prev);
      triggerBattleAnims(b, newRounds);
    }
    prevBattleRounds[b.battle_id] = cur;
  });
  state.battles = battles;
  state.tick++;

  /* events */
  (d.recent_events || []).forEach(function(ev) {
    ev.type = ev.event_type || 'default';
    ev.time = (ev.timestamp || '').slice(11, 19);
    var id = (ev.timestamp || '') + ':' + ev.type + ':' + (ev.message || '');
    if (!seenEventIds.has(id)) {
      seenEventIds.add(id);
      feedItems.unshift({ ev: ev, isNew: true });
      /* victory burst */
      if (ev.type === 'combat' && (ev.message || '').indexOf('擊敗') !== -1 && ev.location_id) {
        triggerVictoryBurst(ev.location_id);
      }
    }
  });
  if (feedItems.length > 50) feedItems.length = 50;
}

function triggerMove(agentName, fromLocId, toLocId) {
  var agent = state.agents.find(function(a) { return a.name === agentName; });
  if (!agent) return;
  var agentsAtFrom = state.agents.filter(function(a) { return a.location === fromLocId; });
  var agentsAtTo   = state.agents.filter(function(a) { return a.location === toLocId; });
  var fromIdx = agentsAtFrom.findIndex ? agentsAtFrom.findIndex(function(a) { return a.name === agentName; }) : 0;
  var toIdx   = agentsAtTo.findIndex   ? agentsAtTo.findIndex(function(a)   { return a.name === agentName; }) : 0;
  var fromPos = getAgentPos(fromLocId, fromIdx, agentsAtFrom.length || 1);
  var toPos   = getAgentPos(toLocId,   toIdx,   agentsAtTo.length   || 1);
  movingAgents[agentName] = { fromX: fromPos.x, fromY: fromPos.y, toX: toPos.x, toY: toPos.y, startTime: Date.now() };
  trailLines.push({ x1: fromPos.x, y1: fromPos.y, x2: toPos.x, y2: toPos.y, startTime: Date.now() });
}

function triggerBattleAnims(battle, newRounds) {
  /* find agent and monster positions */
  var agent = state.agents.find(function(a) { return a.name === battle.agent_name; });
  if (!agent) return;
  var agentIdx = 0, total = 1;
  var agentsHere = state.agents.filter(function(a) { return a.location === agent.location; });
  if (agentsHere.findIndex) agentIdx = agentsHere.findIndex(function(a) { return a.name === agent.name; });
  total = agentsHere.length || 1;
  var aPos = getAgentPos(agent.location, agentIdx, total);
  var lc   = LOC_CENTERS[agent.location] || { x: 280, y: 155 };

  newRounds.forEach(function(round) {
    var mxOffset = 12 + (Math.random() * 8 - 4);
    var myOffset = -16 + (Math.random() * 8 - 4);
    var mx = lc.x + mxOffset;
    var my = lc.y + myOffset;
    var midX = (aPos.x + mx) / 2;
    var midY = (aPos.y + my) / 2;
    attackFlashes.push({ x: midX, y: midY, startTime: Date.now() });
    if (round.attacker === 'agent') {
      damageFloats.push({ x: mx, y: my - 5, text: '-' + round.damage + (round.crit ? '!' : ''), color: round.crit ? '#e3b341' : '#3fb950', startTime: Date.now() });
    } else {
      damageFloats.push({ x: aPos.x, y: aPos.y - 12, text: '-' + round.damage + (round.crit ? '!' : ''), color: round.crit ? '#e3b341' : '#f85149', startTime: Date.now() });
    }
  });
}

function triggerVictoryBurst(locId) {
  var c = LOC_CENTERS[locId];
  if (!c) return;
  victoryBursts.push({ x: c.x, y: c.y, startTime: Date.now() });
}

/* ===== RENDER ===== */
function render() {
  renderHeader();
  renderStats();
  renderMap();
  renderFeed();
  renderSidePanel();
}

/* Header */
function renderHeader() {
  document.getElementById('tickNum').textContent = state.tick;
  document.getElementById('headerAgentCount').textContent = (state.stats.online_agents || state.agents.length || 0);
}

/* Stats Bar */
function renderStats() {
  var s = state.stats;
  var agents = s.online_agents !== undefined ? s.online_agents : state.agents.length;
  var monsters = s.total_monsters !== undefined ? s.total_monsters : 0;

  setTxt('statAgents', agents);
  setTxt('statAgentsSub', 'of ' + (s.total_agents || agents) + ' total');
  setTxt('statMonsters', monsters);

  var combatCount = state.battles.length;
  setTxt('statMonstersSub', combatCount + ' in combat');
  setTxt('statKills', s.total_kills !== undefined ? s.total_kills : '—');
  setTxt('statKillsSub', 'all time');

  setTxt('statWorldEnergy', s.total_energy_in_world !== undefined ? s.total_energy_in_world : '—');
  setTxt('statWorldEnergySub', 'in world');

  if (s.highest_level_agent) {
    setTxt('statHighLevel', s.highest_level_agent.level);
    setTxt('statHighLevelSub', s.highest_level_agent.name);
  } else {
    setTxt('statHighLevel', '—');
    setTxt('statHighLevelSub', '');
  }
}

function setTxt(id, val) {
  var el = document.getElementById(id);
  if (el) el.textContent = val;
}

/* ===== MAP ===== */
var mapInitialized = false;
var connLineEls = {};    /* 'a-b' → SVGElement */
var locNodeEls  = {};    /* locId → g element */
var agentLayerEl = null;
var overlayLayerEl = null;

function getMapSize() {
  var wrapper = document.getElementById('mapWrapper');
  return { w: wrapper.offsetWidth || 560, h: wrapper.offsetHeight || 380 };
}

function mapScale() {
  var sz = getMapSize();
  return { sx: sz.w / 560, sy: sz.h / 380 };
}

function tx(x) { return x * mapScale().sx; }
function ty(y) { return y * mapScale().sy; }

function renderMap() {
  var svg = document.getElementById('worldMap');
  var sz = getMapSize();
  svg.setAttribute('viewBox', '0 0 560 380');
  svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');

  if (!mapInitialized) {
    initMapStatic(svg, sz);
    mapInitialized = true;
  }
  updateMapDynamic(svg);
}

function initMapStatic(svg) {
  /* Background grid dots */
  var bg = svgEl('g');
  bg.setAttribute('class', 'map-bg');
  for (var gx = 20; gx <= 540; gx += 30) {
    for (var gy = 15; gy <= 365; gy += 30) {
      var dot = svgEl('circle');
      dot.setAttribute('cx', gx);
      dot.setAttribute('cy', gy);
      dot.setAttribute('r', '0.8');
      dot.setAttribute('fill', '#1a1f2b');
      bg.appendChild(dot);
    }
  }
  svg.appendChild(bg);

  /* Continent outline — right-angle circuit board shape */
  var outline = svgEl('path');
  outline.setAttribute('d',
    'M 60,30 L 500,30 L 500,80 L 510,80 L 510,320 L 460,320 L 460,360 L 60,360 L 60,300 L 40,300 L 40,110 L 60,110 Z'
  );
  outline.setAttribute('fill', 'none');
  outline.setAttribute('stroke', '#1a2030');
  outline.setAttribute('stroke-width', '1.5');
  svg.appendChild(outline);

  /* Connection lines */
  var connLayer = svgEl('g');
  connLayer.setAttribute('id', 'connLayer');
  CONNECTIONS.forEach(function(pair) {
    var a = pair[0], b = pair[1];
    var ca = LOC_CENTERS[a], cb = LOC_CENTERS[b];
    if (!ca || !cb) return;
    var key = a + '-' + b;
    var line = svgEl('line');
    line.setAttribute('x1', ca.x); line.setAttribute('y1', ca.y);
    line.setAttribute('x2', cb.x); line.setAttribute('y2', cb.y);
    line.setAttribute('stroke', '#1e2d40');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '5 4');
    line.style.animation = 'dashFlow 1.5s linear infinite';
    connLayer.appendChild(line);
    connLineEls[key] = line;
  });
  svg.appendChild(connLayer);

  /* Location nodes */
  var locLayer = svgEl('g');
  locLayer.setAttribute('id', 'locLayer');
  Object.keys(LOC_CENTERS).forEach(function(locId) {
    var c    = LOC_CENTERS[locId];
    var meta = LOC_META[locId] || { name: locId, type:'wild', color:'#8b949e' };
    var g = svgEl('g');
    g.setAttribute('class', 'loc-node');
    g.setAttribute('data-loc', locId);
    g.style.cursor = 'pointer';

    /* Outer ring */
    var ring = svgEl('circle');
    ring.setAttribute('cx', c.x); ring.setAttribute('cy', c.y); ring.setAttribute('r', '14');
    ring.setAttribute('fill', 'rgba(0,0,0,0.5)');
    ring.setAttribute('stroke', meta.color);
    ring.setAttribute('stroke-width', '1.5');

    /* Inner dot */
    var inner = svgEl('circle');
    inner.setAttribute('cx', c.x); inner.setAttribute('cy', c.y); inner.setAttribute('r', '5');
    inner.setAttribute('fill', meta.color);
    inner.setAttribute('opacity', '0.85');

    /* Label */
    var lbl = svgEl('text');
    lbl.setAttribute('x', c.x); lbl.setAttribute('y', c.y + 26);
    lbl.setAttribute('text-anchor', 'middle');
    lbl.setAttribute('font-size', '9');
    lbl.setAttribute('font-family', "'SF Mono', Consolas, monospace");
    lbl.setAttribute('fill', '#8b949e');
    lbl.setAttribute('letter-spacing', '0.5');
    lbl.textContent = meta.name;

    /* Type indicator */
    var typeLbl = svgEl('text');
    typeLbl.setAttribute('x', c.x); typeLbl.setAttribute('y', c.y + 35);
    typeLbl.setAttribute('text-anchor', 'middle');
    typeLbl.setAttribute('font-size', '7');
    typeLbl.setAttribute('font-family', "'SF Mono', Consolas, monospace");
    typeLbl.setAttribute('fill', meta.type === 'town' ? '#1f6feb' : '#484f58');
    typeLbl.textContent = meta.type === 'town' ? '[TOWN]' : '[WILD]';

    g.appendChild(ring); g.appendChild(inner); g.appendChild(lbl); g.appendChild(typeLbl);
    g.addEventListener('click', function() { onLocClick(locId); });
    locLayer.appendChild(g);
    locNodeEls[locId] = g;
  });
  svg.appendChild(locLayer);

  /* Dynamic layers */
  agentLayerEl   = svgEl('g'); agentLayerEl.setAttribute('id', 'agentLayer');
  overlayLayerEl = svgEl('g'); overlayLayerEl.setAttribute('id', 'overlayLayer');
  svg.appendChild(agentLayerEl);
  svg.appendChild(overlayLayerEl);
}

function updateMapDynamic(svg) {
  /* Clear dynamic layers */
  while (agentLayerEl.firstChild) agentLayerEl.removeChild(agentLayerEl.firstChild);
  while (overlayLayerEl.firstChild) overlayLayerEl.removeChild(overlayLayerEl.firstChild);

  /* Highlight active battle connection lines */
  CONNECTIONS.forEach(function(pair) {
    var key = pair[0] + '-' + pair[1];
    var el = connLineEls[key];
    if (!el) return;
    el.setAttribute('stroke', '#1e2d40');
    el.setAttribute('stroke-width', '1.5');
  });

  /* Trail lines */
  var now = Date.now();
  trailLines = trailLines.filter(function(t) { return now - t.startTime < 2000; });
  trailLines.forEach(function(t) {
    var age = (now - t.startTime) / 2000;
    var line = svgEl('line');
    line.setAttribute('x1', t.x1); line.setAttribute('y1', t.y1);
    line.setAttribute('x2', t.x2); line.setAttribute('y2', t.y2);
    line.setAttribute('stroke', '#58a6ff');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '4 4');
    line.setAttribute('opacity', String(0.6 * (1 - age)));
    overlayLayerEl.appendChild(line);
  });

  /* Victory bursts */
  victoryBursts = victoryBursts.filter(function(b) { return now - b.startTime < 900; });
  victoryBursts.forEach(function(b) {
    var age = (now - b.startTime) / 900;
    var burst = svgEl('circle');
    burst.setAttribute('cx', b.x); burst.setAttribute('cy', b.y);
    burst.setAttribute('r', String(5 + age * 38));
    burst.setAttribute('fill', 'none');
    burst.setAttribute('stroke', '#e3b341');
    burst.setAttribute('stroke-width', '2');
    burst.setAttribute('opacity', String(0.9 * (1 - age)));
    overlayLayerEl.appendChild(burst);
  });

  /* Monster indicators per location */
  Object.keys(state.locations).forEach(function(locId) {
    var loc = state.locations[locId];
    var c = LOC_CENTERS[locId];
    if (!c || !loc.monsters) return;
    loc.monsters.forEach(function(m, mi) {
      var angle = (Math.PI * 2 * mi / Math.max(loc.monsters.length, 1)) + Math.PI * 0.25;
      var dist = 22;
      var mx = c.x + Math.cos(angle) * dist;
      var my = c.y + Math.sin(angle) * dist;
      var pct = m.max_hp > 0 ? m.hp / m.max_hp : 1;
      var mcolor = pct < 1 ? '#e3b341' : '#da3633';
      var diamond = svgEl('polygon');
      var dx = 4, dy = 5;
      diamond.setAttribute('points',
        mx + ',' + (my - dy) + ' ' +
        (mx + dx) + ',' + my + ' ' +
        mx + ',' + (my + dy) + ' ' +
        (mx - dx) + ',' + my
      );
      diamond.setAttribute('fill', mcolor);
      diamond.setAttribute('opacity', '0.8');
      overlayLayerEl.appendChild(diamond);
    });
  });

  /* Battle links */
  state.battles.forEach(function(battle) {
    var agent = state.agents.find(function(a) { return a.name === battle.agent_name; });
    if (!agent) return;
    var agentsHere = state.agents.filter(function(a) { return a.location === agent.location; });
    var aIdx = agentsHere.findIndex ? agentsHere.findIndex(function(a) { return a.name === agent.name; }) : 0;
    var aPos = getAgentPos(agent.location, aIdx, agentsHere.length || 1);
    var c = LOC_CENTERS[agent.location] || { x:280, y:155 };
    var bline = svgEl('line');
    bline.setAttribute('x1', aPos.x); bline.setAttribute('y1', aPos.y);
    bline.setAttribute('x2', c.x + 12);   bline.setAttribute('y2', c.y - 16);
    bline.setAttribute('stroke', '#f85149');
    bline.setAttribute('stroke-width', '1.5');
    bline.setAttribute('stroke-dasharray', '4 3');
    bline.setAttribute('opacity', '0.65');
    bline.style.animation = 'dashFlow 0.8s linear infinite';
    overlayLayerEl.appendChild(bline);
  });

  /* Attack flashes */
  attackFlashes = attackFlashes.filter(function(f) { return now - f.startTime < 400; });
  attackFlashes.forEach(function(f) {
    var age = (now - f.startTime) / 400;
    var sz = 6 * (1 - age);
    var l1 = svgEl('line');
    l1.setAttribute('x1', f.x - sz); l1.setAttribute('y1', f.y - sz);
    l1.setAttribute('x2', f.x + sz); l1.setAttribute('y2', f.y + sz);
    l1.setAttribute('stroke', '#f0883e'); l1.setAttribute('stroke-width', '2');
    l1.setAttribute('opacity', String(1 - age));
    var l2 = svgEl('line');
    l2.setAttribute('x1', f.x + sz); l2.setAttribute('y1', f.y - sz);
    l2.setAttribute('x2', f.x - sz); l2.setAttribute('y2', f.y + sz);
    l2.setAttribute('stroke', '#f0883e'); l2.setAttribute('stroke-width', '2');
    l2.setAttribute('opacity', String(1 - age));
    overlayLayerEl.appendChild(l1);
    overlayLayerEl.appendChild(l2);
  });

  /* Damage floats */
  damageFloats = damageFloats.filter(function(f) { return now - f.startTime < 1000; });
  damageFloats.forEach(function(f) {
    var age = (now - f.startTime) / 1000;
    var ft = svgEl('text');
    ft.setAttribute('x', f.x);
    ft.setAttribute('y', String(f.y - age * 32));
    ft.setAttribute('text-anchor', 'middle');
    ft.setAttribute('font-size', '10');
    ft.setAttribute('font-family', "'SF Mono', Consolas, monospace");
    ft.setAttribute('font-weight', '700');
    ft.setAttribute('fill', f.color);
    ft.setAttribute('opacity', String(Math.max(0, 1 - age)));
    ft.textContent = f.text;
    overlayLayerEl.appendChild(ft);
  });

  /* Agent markers */
  var agentsByLoc = {};
  state.agents.forEach(function(a) {
    if (!agentsByLoc[a.location]) agentsByLoc[a.location] = [];
    agentsByLoc[a.location].push(a);
  });

  state.agents.forEach(function(agent) {
    var agentsHere = agentsByLoc[agent.location] || [agent];
    var idx = agentsHere.indexOf(agent);
    if (idx === -1) idx = 0;
    var pos = getAgentPos(agent.location, idx, agentsHere.length);

    /* Check if moving */
    var mv = movingAgents[agent.name];
    var drawX = pos.x, drawY = pos.y;
    if (mv) {
      var progress = Math.min(1, (now - mv.startTime) / 1000);
      drawX = mv.fromX + (mv.toX - mv.fromX) * progress;
      drawY = mv.fromY + (mv.toY - mv.fromY) * progress;
      if (progress >= 1) delete movingAgents[agent.name];
    }

    var inCombat = agent.status === 'combat';
    var ci = classInfo(agent.class);
    var isDimmed = spectateMode && trackedAgent && trackedAgent !== agent.name;

    var g = svgEl('g');
    g.setAttribute('class', 'agent-marker');
    g.style.cursor = 'pointer';
    g.setAttribute('opacity', isDimmed ? '0.25' : '1');

    /* Aura / pulse ring */
    var aura = svgEl('circle');
    aura.setAttribute('cx', drawX); aura.setAttribute('cy', drawY);
    aura.setAttribute('r', '12');
    aura.setAttribute('fill', 'none');
    aura.setAttribute('stroke', inCombat ? '#f0883e' : ci.color);
    aura.setAttribute('stroke-width', '1.5');
    if (inCombat) {
      aura.style.animation = 'combatAura 0.8s ease-in-out infinite';
    } else {
      aura.style.animation = 'pulseRing 2s ease-out infinite';
    }
    g.appendChild(aura);

    /* Main circle */
    var circle = svgEl('circle');
    circle.setAttribute('cx', drawX); circle.setAttribute('cy', drawY);
    circle.setAttribute('r', '10');
    circle.setAttribute('fill', 'rgba(0,0,0,0.75)');
    circle.setAttribute('stroke', ci.color);
    circle.setAttribute('stroke-width', '1.5');
    g.appendChild(circle);

    /* Class letter */
    var letter = svgEl('text');
    letter.setAttribute('x', drawX); letter.setAttribute('y', String(drawY + 4));
    letter.setAttribute('text-anchor', 'middle');
    letter.setAttribute('font-size', '9');

/* ===== FEED ===== */
var RARE_KEYWORDS = ['Vim', 'Emacs', 'Kubernetes', 'Git Blame'];

function renderFeed() {
  var list = document.getElementById('feedList');
  var items = feedItems;
  var existingRows = list.children.length;
  var newCount = 0;

  items.forEach(function(item, i) {
    if (i >= 50) return;
    if (item.rendered) { item.isNew = false; return; }
    item.rendered = true;
    newCount++;

    var ev = item.ev;
    var row = document.createElement('div');
    row.className = 'feed-row';
    if (item.isNew) row.classList.add('new-event');
    if (ev.type === 'levelup') row.classList.add('flash-levelup');
    if (ev.type === 'death')   row.classList.add('flash-death');

    var isRare = RARE_KEYWORDS.some(function(k) { return (ev.message || '').indexOf(k) !== -1; });
    if (isRare) row.classList.add('rare-loot');

    var timeEl = document.createElement('span');
    timeEl.className = 'feed-time';
    timeEl.textContent = ev.time || '';

    var badge = document.createElement('span');
    badge.className = 'feed-badge badge-' + (ev.type || 'default');
    badge.textContent = ev.type || 'msg';

    var msg = document.createElement('span');
    msg.className = 'feed-msg';
    var prefix = ev.type === 'levelup' ? '★ ' : '';
    msg.textContent = prefix + (ev.message || '');

    row.appendChild(timeEl);
    row.appendChild(badge);
    row.appendChild(msg);

    /* Prepend to front */
    if (list.firstChild) {
      list.insertBefore(row, list.firstChild);
    } else {
      list.appendChild(row);
    }

    item.isNew = false;
  });

  /* Trim excess rows */
  while (list.children.length > 50) {
    list.removeChild(list.lastChild);
  }
}

/* ===== INTERACTIONS ===== */
function onLocClick(locId) {
  selectedLocation = locId;
  viewMode = 'location';
  expandedAgent = null;
  renderSidePanel();
}

function onAgentMarkerClick(agent) {
  if (spectateMode) {
    trackedAgent = trackedAgent === agent.name ? null : agent.name;
    renderMap();
    return;
  }
  expandedAgent = agent.name;
  viewMode = 'agents';
  renderSidePanel();
  /* scroll agent card into view */
  setTimeout(function() {
    var body = document.getElementById('sideBody');
    var cards = body.querySelectorAll('.agent-card');
    for (var i = 0; i < state.agents.length; i++) {
      if (state.agents[i].name === agent.name && cards[i]) {
        cards[i].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        break;
      }
    }
  }, 50);
}

function openBattle(agentName) {
  selectedBattleAgent = agentName;
  viewMode = 'battle';
  expandedAgent = null;
  renderSidePanel();
}

document.getElementById('backLink').addEventListener('click', function() {
  viewMode = 'agents';
  selectedLocation = null;
  selectedBattleAgent = null;
  expandedAgent = null;
  renderSidePanel();
});

/* btnSpectate replaced by view-tab buttons */

document.addEventListener('keydown', function(e) {
  if (e.key === 'f' || e.key === 'F') toggleSpectate();
  if (e.key === 'Escape' && spectateMode) toggleSpectate();
});

function toggleSpectate() {
  if (currentDashView === 'spectate') {
    switchDashboardView('worldmap');
  } else {
    switchDashboardView('spectate');
  }
}

/* ===== ANIMATION LOOP ===== */
var lastAnimTick = 0;
function animFrame(ts) {
  if (ts - lastAnimTick > 50) {  /* ~20fps for map overlay */
    lastAnimTick = ts;
    var hasActive = attackFlashes.length > 0 || damageFloats.length > 0
      || victoryBursts.length > 0 || trailLines.length > 0
      || Object.keys(movingAgents).length > 0;
    if (hasActive) renderMap();
  }
  requestAnimationFrame(animFrame);
}
requestAnimationFrame(animFrame);

/* ===== POLL ===== */
function poll() {
  fetch('/api/dashboard')
    .then(function(r) { return r.json(); })
    .then(function(raw) {
      updateState(raw);
      render();
    })
    .catch(function(err) {
      console.error('Poll error:', err);
    });
}

setInterval(poll, 2000);
poll();

/* ===== ROOM VIEW ===== */
var currentDashView = 'worldmap';

function switchDashboardView(mode) {
  currentDashView = mode;

  document.querySelectorAll('.view-tab').forEach(function(tab) { tab.classList.remove('active'); });
  if (mode === 'worldmap') document.getElementById('tabWorldMap').classList.add('active');
  else if (mode === 'room') document.getElementById('tabRoom').classList.add('active');
  else if (mode === 'spectate') document.getElementById('tabSpectate').classList.add('active');

  var leftCol = document.getElementById('leftCol');
  var roomView = document.getElementById('roomView');
  var sidePanel = document.getElementById('sidePanel');
  var app = document.getElementById('app');

  leftCol.style.display = (mode === 'worldmap' || mode === 'spectate') ? 'flex' : 'none';
  roomView.className = 'room-view' + (mode === 'room' ? ' visible' : '');
  document.getElementById('mainBody').classList.toggle('room-active', mode === 'room');

  if (mode === 'spectate') {
    spectateMode = true;
    app.classList.add('spectate');
  } else {
    spectateMode = false;
    trackedAgent = null;
    app.classList.remove('spectate');
  }

  if (mode === 'room') {
    sidePanel.style.display = 'none';
    initRoomView();
  } else {
    sidePanel.style.display = '';
    if (typeof RoomEngine !== 'undefined') RoomEngine.stopLoop();
  }

  if (mode === 'worldmap') {
    renderMap();
    renderSidePanel();
  }
}

function initRoomView() {
  var canvas = document.getElementById('roomCanvas');
  var wrap = document.getElementById('roomCanvasWrap');

  RoomEngine.init(canvas);
  RoomEngine.resize(wrap.offsetWidth, wrap.offsetHeight);

  var select = document.getElementById('roomSelect');
  var locationId = select.value;

  if (state.agents.length > 0) {
    var firstAgentLoc = state.agents[0].location;
    if (firstAgentLoc) {
      locationId = firstAgentLoc;
      select.value = locationId;
    }
  }

  RoomEngine.loadRoom(locationId);
  RoomEngine.startLoop();
}

document.getElementById('roomSelect').addEventListener('change', function() {
  if (currentDashView === 'room') {
    RoomEngine.loadRoom(this.value);
  }
});

if (typeof RoomEngine !== 'undefined') {
  RoomEngine.onRoomEvent(function(event) {
    if (event.type !== 'data' || !event.data) return;
    updateRoomPanels(event.data);
  });
}

function buildRoomEventRows(events, container) {
  var header = document.createElement('div');
  header.className = 'room-events-header';
  header.textContent = 'Event Feed';
  container.appendChild(header);
  for (var i = 0; i < events.length; i++) {
    var ev = events[i];
    var time = (ev.timestamp || '').slice(11, 19);
    var row = document.createElement('div');
    row.className = 'room-event-row';
    var timeSpan = document.createElement('span');
    timeSpan.style.cssText = 'color:var(--gray);margin-right:6px;';
    timeSpan.textContent = time;
    var badge = document.createElement('span');
    badge.className = 'feed-badge badge-' + (ev.event_type || 'default');
    badge.style.marginRight = '6px';
    badge.textContent = ev.event_type || '';
    var msg = document.createTextNode(ev.message || '');
    row.appendChild(timeSpan);
    row.appendChild(badge);
    row.appendChild(msg);
    container.appendChild(row);
  }
}

function buildNearbyRows(ents, container) {
  var header = document.createElement('div');
  header.className = 'room-nearby-header';
  header.textContent = 'Nearby';
  container.appendChild(header);
  (ents.agents || []).forEach(function(a) {
    var color = CLASS_CONFIG[a.class] ? CLASS_CONFIG[a.class].color : '#8b949e';
    var row = document.createElement('div');
    row.className = 'room-entity-row';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'room-entity-name';
    nameSpan.style.color = color;
    nameSpan.textContent = a.name;
    var infoSpan = document.createElement('span');
    infoSpan.className = 'room-entity-info';
    infoSpan.textContent = 'Lv.' + a.level + ' ' + a.class + ' — ' + a.status;
    row.appendChild(nameSpan); row.appendChild(infoSpan);
    container.appendChild(row);
  });
  (ents.monsters || []).forEach(function(m) {
    var row = document.createElement('div');
    row.className = 'room-entity-row';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'room-entity-name';
    nameSpan.style.color = 'var(--red)';
    nameSpan.textContent = m.name;
    var infoSpan = document.createElement('span');
    infoSpan.className = 'room-entity-info';
    infoSpan.textContent = 'Lv.' + m.level + ' HP:' + m.hp + '/' + m.max_hp;
    row.appendChild(nameSpan); row.appendChild(infoSpan);
    container.appendChild(row);
  });
  (ents.npcs || []).forEach(function(n) {
    var row = document.createElement('div');
    row.className = 'room-entity-row';
    var nameSpan = document.createElement('span');
    nameSpan.className = 'room-entity-name';
    nameSpan.style.color = 'var(--gold)';
    nameSpan.textContent = n.name;
    var infoSpan = document.createElement('span');
    infoSpan.className = 'room-entity-info';
    infoSpan.textContent = n.type;
    row.appendChild(nameSpan); row.appendChild(infoSpan);
    container.appendChild(row);
  });
}

function updateRoomPanels(data) {
  var eventsEl = document.getElementById('roomEvents');
  while (eventsEl.firstChild) eventsEl.removeChild(eventsEl.firstChild);
  buildRoomEventRows(data.recent_events || [], eventsEl);

  var nearbyEl = document.getElementById('roomNearby');
  while (nearbyEl.firstChild) nearbyEl.removeChild(nearbyEl.firstChild);
  buildNearbyRows(data.entities || {}, nearbyEl);
}

window.addEventListener('resize', function() {
  if (currentDashView === 'room') {
    var wrap = document.getElementById('roomCanvasWrap');
    RoomEngine.resize(wrap.offsetWidth, wrap.offsetHeight);
  }
});

window.switchDashboardView = switchDashboardView;

var _origOnLocClick = onLocClick;
onLocClick = function(locId) {
  _origOnLocClick(locId);
};

})();
</script>
</body>
</html>
