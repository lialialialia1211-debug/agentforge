<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentForge — World Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0e14;
      --bg2:      #111820;
      --border:   #1a1f2b;
      --orange:   #f0883e;
      --blue:     #58a6ff;
      --red:      #f85149;
      --green:    #3fb950;
      --gold:     #e3b341;
      --purple:   #d2a8ff;
      --gray:     #3a3f4b;
      --text:     #8b949e;
      --font:     'SF Mono', Consolas, 'Courier New', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      min-width: 1024px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Layout ── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .header-left { display: flex; align-items: baseline; gap: 8px; }

    .brand {
      font-size: 16px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 1px;
    }

    .brand-version {
      font-size: 10px;
      color: var(--gray);
      letter-spacing: 1px;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .tick-counter { font-size: 11px; color: var(--text); }
    .tick-counter span { color: var(--orange); font-weight: 700; }

    .agent-count-header { font-size: 11px; color: var(--text); }
    .agent-count-header span { color: var(--blue); font-weight: 700; }

    .live-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 1px;
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: liveDot 2s ease-in-out infinite;
    }

    @keyframes liveDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Stats Bar ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .stat-card {
      padding: 10px 16px;
      border-right: 1px solid var(--border);
    }
    .stat-card:last-child { border-right: none; }

    .stat-label {
      font-size: 10px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-sub {
      font-size: 10px;
      color: var(--text);
      margin-top: 2px;
    }

    /* ── Main Body ── */
    .main-body {
      display: grid;
      grid-template-columns: 1fr 300px;
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    /* ── Map Area ── */
    .map-area {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .map-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .map-container svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .map-legend {
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 10px;
      color: var(--text);
      flex-shrink: 0;
    }

    .legend-item { display: flex; align-items: center; gap: 4px; }

    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .legend-sq {
      width: 8px; height: 8px;
      border: 1px solid currentColor;
    }

    /* ── Side Panel ── */
    .side-panel {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    .side-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .side-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .side-count {
      font-size: 10px;
      color: var(--text);
    }

    .side-count span { color: var(--blue); }

    .back-link {
      font-size: 10px;
      color: var(--blue);
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 0.7; }

    .side-body {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .side-body::-webkit-scrollbar { width: 3px; }
    .side-body::-webkit-scrollbar-track { background: transparent; }
    .side-body::-webkit-scrollbar-thumb { background: var(--border); }

    .side-divider {
      height: 1px;
      background: var(--border);
      margin: 0;
    }

    /* ── Agent Card ── */
    .agent-card {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    .agent-card:hover { background: rgba(88,166,255,0.03); }

    .agent-card.combat { border-left: 2px solid var(--orange); }

    .agent-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px 2px;
    }

    .agent-name-lv { display: flex; align-items: baseline; gap: 0; flex: 1; }

    .agent-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--blue);
    }

    .agent-lv {
      font-size: 10px;
      color: var(--text);
      margin-left: auto;
    }

    .agent-card-sub {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px 3px;
    }

    .agent-location { font-size: 10px; color: var(--text); }

    .status-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 2px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-idle     { background: rgba(63,185,80,0.12);  color: var(--green); }
    .status-combat   { background: rgba(248,81,73,0.15);  color: var(--red); }
    .status-dead     { background: rgba(218,54,51,0.12);  color: #da3633; }
    .status-traveling{ background: rgba(88,166,255,0.12); color: var(--blue); }

    .agent-hp-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 2px 12px 6px;
    }

    .hp-bar-bg {
      flex: 1;
      height: 5px;
      background: var(--border);
      overflow: hidden;
    }

    .hp-bar-fill {
      height: 100%;
      transition: width 0.4s ease;
    }

    .hp-high   { background: var(--green); }
    .hp-mid    { background: var(--gold); }
    .hp-low    { background: var(--red); }

    .hp-pct   { font-size: 10px; color: var(--text); min-width: 28px; text-align: right; }
    .hp-nums  { font-size: 10px; color: var(--gray); }

    /* Agent expanded */
    .agent-expand {
      border-top: 1px solid var(--border);
      padding: 6px 12px 8px;
      display: none;
    }

    .agent-expand.open { display: block; }

    .expand-section-label {
      font-size: 9px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .equip-row { display: flex; gap: 12px; margin-bottom: 4px; flex-wrap: wrap; }

    .equip-item { font-size: 10px; }

    .stats-row-mini { display: flex; gap: 10px; font-size: 10px; margin-top: 4px; }
    .stat-mini { color: var(--text); }
    .stat-mini span { color: var(--orange); }

    /* Rarity colors */
    .rarity-white  { color: var(--text); }
    .rarity-green  { color: var(--green); }
    .rarity-blue   { color: var(--blue); }
    .rarity-purple { color: var(--purple); }

    /* ── Location Detail ── */
    .loc-detail { padding: 10px 12px 0; }

    .loc-detail-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--orange);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .loc-detail-type { font-size: 10px; color: var(--text); margin-bottom: 4px; }

    .loc-detail-desc {
      font-size: 10px;
      color: var(--gray);
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .detail-section-label {
      font-size: 9px;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 6px 12px 4px;
      border-top: 1px solid var(--border);
      margin-top: 2px;
    }

    /* Monster list */
    .monster-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px;
      font-size: 10px;
    }

    .monster-prefix { color: var(--gray); width: 10px; flex-shrink: 0; }
    .monster-name   { color: var(--red); width: 70px; flex-shrink: 0; }
    .monster-lv     { color: var(--text); width: 32px; flex-shrink: 0; }

    .monster-hp-bg {
      flex: 1;
      height: 4px;
      background: var(--border);
      overflow: hidden;
    }

    .monster-hp-fill {
      height: 100%;
      background: var(--green);
    }

    .monster-hp-fill.damaged { background: var(--gold); }

    .monster-hp-txt { font-size: 9px; color: var(--gray); min-width: 40px; text-align: right; }

    /* Exits */
    .exit-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 12px;
      font-size: 10px;
      cursor: pointer;
      color: var(--blue);
      transition: opacity 0.15s;
    }

    .exit-item:hover { opacity: 0.7; }

    .exit-arrow { color: var(--gray); }
    .exit-type  { font-size: 9px; color: var(--gray); }

    /* Empty state */
    .empty-msg {
      padding: 12px;
      font-size: 10px;
      color: var(--gray);
      text-align: center;
    }

    /* ── Event Feed ── */
    .event-feed {
      height: 160px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .feed-header {
      display: flex;
      align-items: center;
      padding: 5px 14px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .feed-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .feed-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: none;
    }

    .feed-list::-webkit-scrollbar { display: none; }

    .feed-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 14px;
      border-bottom: 1px solid rgba(26,31,43,0.5);
      font-size: 11px;
    }

    .feed-row.new-event {
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .feed-time { font-size: 10px; color: var(--gray); flex-shrink: 0; }

    .feed-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 2px;
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge-combat  { background: rgba(248,81,73,0.15);  color: var(--red); }
    .badge-loot    { background: rgba(227,179,65,0.15);  color: var(--gold); }
    .badge-move    { background: rgba(88,166,255,0.15);  color: var(--blue); }
    .badge-death   { background: rgba(218,54,51,0.15);   color: #f85149; }
    .badge-levelup { background: rgba(210,168,255,0.15); color: var(--purple); }
    .badge-trade   { background: rgba(63,185,80,0.15);   color: var(--green); }
    .badge-default { background: rgba(59,63,75,0.3);     color: var(--text); }

    .feed-msg { color: var(--text); flex: 1; }

    /* ── SVG Map Styles ── */
    .loc-node {
      cursor: pointer;
      transition: stroke-width 0.15s, fill 0.15s;
    }

    .loc-node:hover { stroke-width: 2.5 !important; }
    .loc-node.selected { stroke-width: 2.5 !important; fill: #151a24 !important; }

    .pulse-ring {
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.15); }
    }

    /* ── Animations ── */
    @keyframes pulse-css {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <span class="brand">AgentForge</span>
      <span class="brand-version">v0.2</span>
    </div>
    <div class="header-right">
      <span class="tick-counter">TICK <span id="tickNum">0</span></span>
      <span class="agent-count-header"><span id="headerAgentCount">0</span> agents</span>
      <div class="live-badge">
        <div class="live-dot" id="liveDot"></div>
        LIVE
      </div>
    </div>
  </header>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-label">Agents Online</div>
      <div class="stat-value" id="statAgents" style="color:var(--blue)">—</div>
      <div class="stat-sub" id="statAgentsSub"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Active Monsters</div>
      <div class="stat-value" id="statMonsters" style="color:var(--red)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Kills</div>
      <div class="stat-value" id="statKills" style="color:var(--orange)">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Highest Level</div>
      <div class="stat-value" id="statHighLv" style="color:var(--purple)">—</div>
      <div class="stat-sub" id="statHighName"></div>
    </div>
  </div>

  <!-- Main Body -->
  <div class="main-body" style="flex:1; min-height:0; display:grid;">

    <!-- Left: Map + Event Feed -->
    <div style="display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; min-height:0;">

      <!-- Map -->
      <div class="map-container" style="flex:1; min-height:0;">
        <svg id="worldMap" viewBox="0 0 560 320" preserveAspectRatio="xMidYMid meet">

          <!-- ── Continent outline ── -->
          <path d="M 60 30 L 90 15 L 160 20 L 230 10 L 310 18 L 390 8 L 460 25 L 510 50 L 530 95 L 520 155 L 510 210 L 500 265 L 470 295 L 420 308 L 350 312 L 280 305 L 200 308 L 140 295 L 90 270 L 55 235 L 40 185 L 38 130 L 45 75 Z"
                fill="#111820" stroke="#1a1f2b" stroke-width="0.5"/>

          <!-- ── Rivers ── -->
          <path d="M 180 60 Q 210 100 230 140 Q 250 175 270 200 Q 290 220 310 240"
                fill="none" stroke="#0d1520" stroke-width="2"/>

          <!-- ── Mountain decoration (NE, near mine_entrance) ── -->
          <g stroke="#1a2030" stroke-width="1" fill="none">
            <polyline points="355,90 365,75 375,90"/>
            <polyline points="370,90 382,72 394,90"/>
            <polyline points="388,88 398,73 408,88"/>
            <polyline points="358,105 370,90 382,105"/>
            <polyline points="375,103 388,88 401,103"/>
          </g>

          <!-- ── Forest decoration (W area, near dark_forest) ── -->
          <g stroke="#151a24" stroke-width="1" fill="none">
            <line x1="68" y1="165" x2="68" y2="150"/>
            <line x1="74" y1="163" x2="74" y2="148"/>
            <line x1="80" y1="166" x2="80" y2="151"/>
            <line x1="86" y1="164" x2="86" y2="149"/>
            <line x1="72" y1="178" x2="72" y2="163"/>
            <line x1="78" y1="175" x2="78" y2="160"/>
            <line x1="84" y1="177" x2="84" y2="162"/>
          </g>

          <!-- ── Tombstone decoration (SE, near graveyard) ── -->
          <g stroke="#1a2030" stroke-width="1" fill="none">
            <rect x="398" y="258" width="7" height="9" rx="3"/>
            <line x1="401.5" y1="267" x2="401.5" y2="272"/>
            <rect x="412" y="262" width="6" height="8" rx="2.5"/>
            <line x1="415" y1="270" x2="415" y2="275"/>
            <rect x="425" y="256" width="8" height="10" rx="3.5"/>
            <line x1="429" y1="266" x2="429" y2="271"/>
          </g>

          <!-- ── Connection lines ── -->
          <!-- starter_village(200,70) ↔ dark_forest(100,165) -->
          <line x1="200" y1="70" x2="100" y2="165"
                stroke="#1a1f2b" stroke-dasharray="4 3" stroke-width="1"/>
          <!-- starter_village(200,70) ↔ town_market(130,260) -->
          <line x1="200" y1="70" x2="130" y2="260"
                stroke="#1a1f2b" stroke-dasharray="4 3" stroke-width="1"/>
          <!-- dark_forest(100,165) ↔ mine_entrance(380,130) -->
          <line x1="100" y1="165" x2="380" y2="130"
                stroke="#1a1f2b" stroke-dasharray="4 3" stroke-width="1"/>
          <!-- town_market(130,260) ↔ abandoned_graveyard(420,250) -->
          <line x1="130" y1="260" x2="420" y2="250"
                stroke="#1a1f2b" stroke-dasharray="4 3" stroke-width="1"/>

          <!-- ── Location nodes ── -->

          <!-- starter_village (200, 70) — town → blue -->
          <g id="node-starter_village" data-loc="starter_village">
            <circle class="pulse-ring" cx="200" cy="70" r="22" fill="none" stroke="#1f6feb" stroke-width="0.5" opacity="0" id="pulse-starter_village"/>
            <circle class="loc-node" id="circle-starter_village" cx="200" cy="70" r="16"
                    fill="#0a0e14" stroke="#1f6feb" stroke-width="1.5" style="cursor:pointer"/>
            <text x="200" y="46" fill="#58a6ff" font-size="10" text-anchor="middle" font-weight="600"
                  style="pointer-events:none; font-family:'SF Mono',Consolas,'Courier New',monospace;">新手村</text>
            <g id="indi-starter_village" style="pointer-events:none">
              <circle cx="186" cy="80" r="2.5" fill="#3fb950" id="agdot-starter_village" opacity="0"/>
              <text x="191" y="83" fill="#3fb950" font-size="8" id="agcount-starter_village" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
              <circle cx="210" cy="80" r="2.5" fill="#f85149" id="mondot-starter_village" opacity="0"/>
              <text x="215" y="83" fill="#f85149" font-size="8" id="moncount-starter_village" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
            </g>
            <!-- combat swords icon, hidden by default -->
            <g id="combat-starter_village" opacity="0" style="pointer-events:none">
              <line x1="195" y1="63" x2="205" y2="75" stroke="#f0883e" stroke-width="1.5"/>
              <line x1="205" y1="63" x2="195" y2="75" stroke="#f0883e" stroke-width="1.5"/>
            </g>
          </g>

          <!-- dark_forest (100, 165) — wild level_max < 5 → orange -->
          <g id="node-dark_forest" data-loc="dark_forest">
            <circle class="pulse-ring" cx="100" cy="165" r="22" fill="none" stroke="#f0883e" stroke-width="0.5" opacity="0" id="pulse-dark_forest"/>
            <circle class="loc-node" id="circle-dark_forest" cx="100" cy="165" r="16"
                    fill="#0a0e14" stroke="#f0883e" stroke-width="1.5" style="cursor:pointer"/>
            <text x="100" y="141" fill="#f0883e" font-size="10" text-anchor="middle" font-weight="600"
                  style="pointer-events:none; font-family:'SF Mono',Consolas,'Courier New',monospace;">幽暗森林</text>
            <g id="indi-dark_forest" style="pointer-events:none">
              <circle cx="86" cy="175" r="2.5" fill="#3fb950" id="agdot-dark_forest" opacity="0"/>
              <text x="91" y="178" fill="#3fb950" font-size="8" id="agcount-dark_forest" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
              <circle cx="110" cy="175" r="2.5" fill="#f85149" id="mondot-dark_forest" opacity="0"/>
              <text x="115" y="178" fill="#f85149" font-size="8" id="moncount-dark_forest" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
            </g>
            <g id="combat-dark_forest" opacity="0" style="pointer-events:none">
              <line x1="95" y1="158" x2="105" y2="170" stroke="#f0883e" stroke-width="1.5"/>
              <line x1="105" y1="158" x2="95" y2="170" stroke="#f0883e" stroke-width="1.5"/>
            </g>
          </g>

          <!-- town_market (130, 260) — town → blue -->
          <g id="node-town_market" data-loc="town_market">
            <circle class="pulse-ring" cx="130" cy="260" r="22" fill="none" stroke="#1f6feb" stroke-width="0.5" opacity="0" id="pulse-town_market"/>
            <circle class="loc-node" id="circle-town_market" cx="130" cy="260" r="16"
                    fill="#0a0e14" stroke="#1f6feb" stroke-width="1.5" style="cursor:pointer"/>
            <text x="130" y="236" fill="#58a6ff" font-size="10" text-anchor="middle" font-weight="600"
                  style="pointer-events:none; font-family:'SF Mono',Consolas,'Courier New',monospace;">城鎮市集</text>
            <g id="indi-town_market" style="pointer-events:none">
              <circle cx="116" cy="270" r="2.5" fill="#3fb950" id="agdot-town_market" opacity="0"/>
              <text x="121" y="273" fill="#3fb950" font-size="8" id="agcount-town_market" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
              <circle cx="140" cy="270" r="2.5" fill="#f85149" id="mondot-town_market" opacity="0"/>
              <text x="145" y="273" fill="#f85149" font-size="8" id="moncount-town_market" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
            </g>
            <g id="combat-town_market" opacity="0" style="pointer-events:none">
              <line x1="125" y1="253" x2="135" y2="265" stroke="#f0883e" stroke-width="1.5"/>
              <line x1="135" y1="253" x2="125" y2="265" stroke="#f0883e" stroke-width="1.5"/>
            </g>
          </g>

          <!-- mine_entrance (380, 130) — wild level_max ~5-7 → orange -->
          <g id="node-mine_entrance" data-loc="mine_entrance">
            <circle class="pulse-ring" cx="380" cy="130" r="22" fill="none" stroke="#f0883e" stroke-width="0.5" opacity="0" id="pulse-mine_entrance"/>
            <circle class="loc-node" id="circle-mine_entrance" cx="380" cy="130" r="16"
                    fill="#0a0e14" stroke="#f0883e" stroke-width="1.5" style="cursor:pointer"/>
            <text x="380" y="106" fill="#f0883e" font-size="10" text-anchor="middle" font-weight="600"
                  style="pointer-events:none; font-family:'SF Mono',Consolas,'Courier New',monospace;">礦坑入口</text>
            <g id="indi-mine_entrance" style="pointer-events:none">
              <circle cx="366" cy="140" r="2.5" fill="#3fb950" id="agdot-mine_entrance" opacity="0"/>
              <text x="371" y="143" fill="#3fb950" font-size="8" id="agcount-mine_entrance" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
              <circle cx="390" cy="140" r="2.5" fill="#f85149" id="mondot-mine_entrance" opacity="0"/>
              <text x="395" y="143" fill="#f85149" font-size="8" id="moncount-mine_entrance" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
            </g>
            <g id="combat-mine_entrance" opacity="0" style="pointer-events:none">
              <line x1="375" y1="123" x2="385" y2="135" stroke="#f0883e" stroke-width="1.5"/>
              <line x1="385" y1="123" x2="375" y2="135" stroke="#f0883e" stroke-width="1.5"/>
            </g>
          </g>

          <!-- abandoned_graveyard (420, 250) — wild level_min >= 5 → red/danger -->
          <g id="node-abandoned_graveyard" data-loc="abandoned_graveyard">
            <circle class="pulse-ring" cx="420" cy="250" r="22" fill="none" stroke="#da3633" stroke-width="0.5" opacity="0" id="pulse-abandoned_graveyard"/>
            <circle class="loc-node" id="circle-abandoned_graveyard" cx="420" cy="250" r="16"
                    fill="#0a0e14" stroke="#da3633" stroke-width="1.5" style="cursor:pointer"/>
            <text x="420" y="226" fill="#f85149" font-size="10" text-anchor="middle" font-weight="600"
                  style="pointer-events:none; font-family:'SF Mono',Consolas,'Courier New',monospace;">荒廢墓地</text>
            <g id="indi-abandoned_graveyard" style="pointer-events:none">
              <circle cx="406" cy="260" r="2.5" fill="#3fb950" id="agdot-abandoned_graveyard" opacity="0"/>
              <text x="411" y="263" fill="#3fb950" font-size="8" id="agcount-abandoned_graveyard" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
              <circle cx="430" cy="260" r="2.5" fill="#f85149" id="mondot-abandoned_graveyard" opacity="0"/>
              <text x="435" y="263" fill="#f85149" font-size="8" id="moncount-abandoned_graveyard" font-family="'SF Mono',Consolas,'Courier New',monospace"></text>
            </g>
            <g id="combat-abandoned_graveyard" opacity="0" style="pointer-events:none">
              <line x1="415" y1="243" x2="425" y2="255" stroke="#f0883e" stroke-width="1.5"/>
              <line x1="425" y1="243" x2="415" y2="255" stroke="#f0883e" stroke-width="1.5"/>
            </g>
          </g>

        </svg>
      </div>

      <!-- Map Legend -->
      <div class="map-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--green)"></div>
          <span>agents</span>
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--red)"></div>
          <span>monsters</span>
        </div>
        <div class="legend-item">
          <div class="legend-sq" style="color:var(--blue)"></div>
          <span>town</span>
        </div>
        <div class="legend-item">
          <div class="legend-sq" style="color:var(--orange)"></div>
          <span>wild</span>
        </div>
        <div class="legend-item">
          <div class="legend-sq" style="color:#da3633"></div>
          <span>danger</span>
        </div>
      </div>

      <!-- Event Feed -->
      <div class="event-feed">
        <div class="feed-header">
          <span class="feed-title">Event Feed</span>
        </div>
        <div class="feed-list" id="feedList"></div>
      </div>

    </div>

    <!-- Right: Side Panel -->
    <div class="side-panel" id="sidePanel">

      <!-- Agent list header (default) -->
      <div class="side-header" id="agentListHeader">
        <span class="side-title">Agents</span>
        <span class="side-count"><span id="sideAgentCount">0</span> online</span>
      </div>

      <!-- Location detail header (hidden by default) -->
      <div class="side-header" id="locDetailHeader" style="display:none;">
        <span class="back-link" id="backLink">&#8592; BACK</span>
      </div>

      <div class="side-divider"></div>
      <div class="side-body" id="sideBody"></div>
    </div>

  </div>
</div>

<script>
  /* ── State ── */
  var state = {
    selectedLocation: null,
    tick: 0,
    data: null,
    expandedAgents: new Set(),
    knownEventIds: new Set()
  };

  var API_URL = '/api/dashboard';
  var POLL_MS = 3000;

  /* ── Location metadata ── */
  var LOC_META = {
    starter_village:    { name: '新手村',  type: 'town',  desc: '冒險者的起點，充滿新手的喧囂。', level_min: 1, level_max: 3 },
    dark_forest:        { name: '幽暗森林', type: 'wild',  desc: '陰暗的森林，樹木遮天蔽日，危機四伏。', level_min: 1, level_max: 4 },
    town_market:        { name: '城鎮市集', type: 'town',  desc: '熱鬧的市集，各種道具與裝備在此交易。', level_min: 1, level_max: 3 },
    mine_entrance:      { name: '礦坑入口', type: 'wild',  desc: '通往深邃礦坑的入口，礦石資源豐富但危險。', level_min: 3, level_max: 6 },
    abandoned_graveyard:{ name: '荒廢墓地', type: 'wild',  desc: '不死生物出沒之地，只有強者才能生還。', level_min: 5, level_max: 9 }
  };

  var LOC_CONNECTIONS = {
    starter_village:     ['dark_forest', 'town_market'],
    dark_forest:         ['starter_village', 'mine_entrance'],
    town_market:         ['starter_village', 'abandoned_graveyard'],
    mine_entrance:       ['dark_forest'],
    abandoned_graveyard: ['town_market']
  };

  /* ── DOM Helpers ── */
  function el(tag, cls) {
    var node = document.createElement(tag);
    if (cls) node.className = cls;
    return node;
  }

  function txt(tag, cls, text) {
    var node = el(tag, cls);
    node.textContent = text;
    return node;
  }

  /* ── Stats ── */
  function updateStats(ws) {
    document.getElementById('statAgents').textContent   = ws.online_agents !== undefined ? ws.online_agents : (ws.total_agents || '—');
    document.getElementById('statAgentsSub').textContent = ws.total_agents ? ('/ ' + ws.total_agents + ' total') : '';
    document.getElementById('statMonsters').textContent = ws.total_monsters !== undefined ? ws.total_monsters : '—';
    document.getElementById('statKills').textContent    = ws.total_kills    !== undefined ? ws.total_kills    : '—';

    if (ws.highest_level_agent) {
      document.getElementById('statHighLv').textContent   = ws.highest_level_agent.level || '—';
      document.getElementById('statHighName').textContent = ws.highest_level_agent.name  || '';
    } else {
      document.getElementById('statHighLv').textContent   = '—';
      document.getElementById('statHighName').textContent = '';
    }

    var onlineCount = ws.online_agents !== undefined ? ws.online_agents : (ws.total_agents || 0);
    document.getElementById('headerAgentCount').textContent = onlineCount;
    document.getElementById('sideAgentCount').textContent   = onlineCount;
  }

  /* ── Map node update ── */
  function updateMapNodes(locations, agents) {
    var locMap = {};
    (locations || []).forEach(function(l) { locMap[l.id] = l; });

    var agentsByLoc = {};
    (agents || []).forEach(function(a) {
      if (!agentsByLoc[a.location_id]) agentsByLoc[a.location_id] = [];
      agentsByLoc[a.location_id].push(a);
    });

    var locIds = ['starter_village', 'dark_forest', 'town_market', 'mine_entrance', 'abandoned_graveyard'];

    locIds.forEach(function(id) {
      var loc     = locMap[id] || {};
      var agCount = loc.agent_count  !== undefined ? loc.agent_count  : (agentsByLoc[id] ? agentsByLoc[id].length : 0);
      var monCount= loc.monster_count!== undefined ? loc.monster_count: 0;

      var pulse   = document.getElementById('pulse-' + id);
      var agdot   = document.getElementById('agdot-' + id);
      var agc     = document.getElementById('agcount-' + id);
      var mondot  = document.getElementById('mondot-' + id);
      var monc    = document.getElementById('moncount-' + id);
      var combatG = document.getElementById('combat-' + id);

      if (pulse) {
        pulse.setAttribute('opacity', agCount > 0 ? '0.3' : '0');
        pulse.style.animation = agCount > 0 ? 'pulse 2s ease-in-out infinite' : 'none';
      }

      if (agdot)  agdot.setAttribute('opacity', agCount > 0 ? '1' : '0');
      if (agc)    agc.textContent  = agCount > 0 ? String(agCount) : '';
      if (mondot) mondot.setAttribute('opacity', monCount > 0 ? '1' : '0');
      if (monc)   monc.textContent = monCount > 0 ? String(monCount) : '';

      var inCombat = false;
      if (agentsByLoc[id]) {
        inCombat = agentsByLoc[id].some(function(a) { return a.status === 'combat'; });
      }
      if (combatG) combatG.setAttribute('opacity', inCombat ? '1' : '0');
    });
  }

  /* ── Map click handlers ── */
  function initMapClicks() {
    var locIds = ['starter_village', 'dark_forest', 'town_market', 'mine_entrance', 'abandoned_graveyard'];
    locIds.forEach(function(id) {
      var circle = document.getElementById('circle-' + id);
      if (circle) {
        circle.addEventListener('click', function() {
          selectLocation(id);
        });
      }
    });
  }

  function selectLocation(id) {
    // Deselect previous
    if (state.selectedLocation) {
      var prev = document.getElementById('circle-' + state.selectedLocation);
      if (prev) {
        prev.classList.remove('selected');
        prev.style.strokeWidth = '1.5';
        prev.style.fill = '#0a0e14';
      }
    }

    if (state.selectedLocation === id) {
      state.selectedLocation = null;
      showAgentList();
      return;
    }

    state.selectedLocation = id;
    var circle = document.getElementById('circle-' + id);
    if (circle) {
      circle.classList.add('selected');
      circle.style.strokeWidth = '2.5';
      circle.style.fill = '#151a24';
    }
    showLocationDetail(id);
  }

  /* ── Side Panel: Agent List ── */
  function showAgentList() {
    document.getElementById('agentListHeader').style.display = 'flex';
    document.getElementById('locDetailHeader').style.display = 'none';
    renderAgentList();
  }

  function renderAgentList() {
    if (!state.data) return;
    var body   = document.getElementById('sideBody');
    var agents = (state.data.agents || []).filter(function(a) { return a.status !== 'dead'; });

    while (body.firstChild) body.removeChild(body.firstChild);

    if (!agents.length) {
      body.appendChild(txt('div', 'empty-msg', '[ NO AGENTS ONLINE ]'));
      return;
    }

    agents.forEach(function(agent) {
      body.appendChild(buildAgentCard(agent));
    });
  }

  function buildAgentCard(agent) {
    var hp     = agent.hp     || 0;
    var maxHp  = agent.max_hp || 1;
    var pct    = Math.round((hp / maxHp) * 100);
    var status = agent.status || 'idle';

    var card = el('div', 'agent-card' + (status === 'combat' ? ' combat' : ''));
    card.dataset.agentName = agent.name;

    // Header row
    var hdr = el('div', 'agent-card-header');
    var nameEl = txt('span', 'agent-name', agent.name);
    var lvEl   = txt('span', 'agent-lv', 'Lv.' + agent.level);
    hdr.appendChild(nameEl);
    hdr.appendChild(lvEl);
    card.appendChild(hdr);

    // Sub row
    var sub = el('div', 'agent-card-sub');
    sub.appendChild(txt('span', 'agent-location', agent.location_name || agent.location_id || '—'));
    sub.appendChild(txt('span', 'status-badge status-' + status, status));
    card.appendChild(sub);

    // HP row
    var hpRow = el('div', 'agent-hp-row');
    var hpBg  = el('div', 'hp-bar-bg');
    var hpFill= el('div', 'hp-bar-fill ' + (pct > 60 ? 'hp-high' : pct > 30 ? 'hp-mid' : 'hp-low'));
    hpFill.style.width = pct + '%';
    hpBg.appendChild(hpFill);
    hpRow.appendChild(hpBg);
    hpRow.appendChild(txt('span', 'hp-pct', pct + '%'));
    hpRow.appendChild(txt('span', 'hp-nums', hp + '/' + maxHp));
    card.appendChild(hpRow);

    // Expanded section
    var expand = el('div', 'agent-expand' + (state.expandedAgents.has(agent.name) ? ' open' : ''));
    expand.appendChild(buildAgentExpand(agent));
    card.appendChild(expand);

    card.addEventListener('click', function() {
      if (state.expandedAgents.has(agent.name)) {
        state.expandedAgents.delete(agent.name);
        expand.classList.remove('open');
      } else {
        state.expandedAgents.add(agent.name);
        expand.classList.add('open');
      }
    });

    return card;
  }

  function buildAgentExpand(agent) {
    var frag = document.createDocumentFragment();

    frag.appendChild(txt('div', 'expand-section-label', 'EQUIPPED'));

    var equipRow = el('div', 'equip-row');

    if (agent.equipped_weapon) {
      var w = agent.equipped_weapon;
      var wEl = el('span', 'equip-item rarity-' + (w.rarity || 'white'));
      wEl.textContent = '\u2694 ' + w.name + (w.attack_bonus ? ' +' + w.attack_bonus : '');
      equipRow.appendChild(wEl);
    }

    if (agent.equipped_armor) {
      var ar = agent.equipped_armor;
      var arEl = el('span', 'equip-item rarity-' + (ar.rarity || 'white'));
      arEl.textContent = '\uD83D\uDEE1 ' + ar.name + (ar.defense_bonus ? ' +' + ar.defense_bonus : '');
      equipRow.appendChild(arEl);
    }

    if (!agent.equipped_weapon && !agent.equipped_armor) {
      equipRow.appendChild(txt('span', 'equip-item rarity-white', '(none)'));
    }

    frag.appendChild(equipRow);

    var statsRow = el('div', 'stats-row-mini');
    var atkEl = el('span', 'stat-mini');
    atkEl.textContent = 'ATK ';
    var atkSpan = el('span');
    atkSpan.style.color = 'var(--orange)';
    atkSpan.textContent = agent.attack || 0;
    atkEl.appendChild(atkSpan);
    statsRow.appendChild(atkEl);

    var defEl = el('span', 'stat-mini');
    defEl.textContent = 'DEF ';
    var defSpan = el('span');
    defSpan.style.color = 'var(--blue)';
    defSpan.textContent = agent.defense || 0;
    defEl.appendChild(defSpan);
    statsRow.appendChild(defEl);

    var goldEl = el('span', 'stat-mini');
    goldEl.textContent = 'GOLD ';
    var goldSpan = el('span');
    goldSpan.style.color = 'var(--gold)';
    var gold = agent.gold || 0;
    goldSpan.textContent = gold >= 1000 ? (gold / 1000).toFixed(1) + 'k' : String(gold);
    goldEl.appendChild(goldSpan);
    statsRow.appendChild(goldEl);

    frag.appendChild(statsRow);
    return frag;
  }

  /* ── Side Panel: Location Detail ── */
  function showLocationDetail(locId) {
    document.getElementById('agentListHeader').style.display = 'none';
    document.getElementById('locDetailHeader').style.display = 'flex';

    var body = document.getElementById('sideBody');
    while (body.firstChild) body.removeChild(body.firstChild);

    if (!state.data) return;

    var locData = null;
    (state.data.locations || []).forEach(function(l) {
      if (l.id === locId) locData = l;
    });

    var meta = LOC_META[locId] || {};
    var name = (locData && locData.name) || meta.name || locId;
    var desc = (locData && locData.description) || meta.desc || '';
    var type = (locData && locData.type) || meta.type || 'wild';
    var lvMin = (locData && locData.level_min) || meta.level_min || 1;
    var lvMax = (locData && locData.level_max) || meta.level_max || 5;

    // Location header info
    var detail = el('div', 'loc-detail');
    detail.appendChild(txt('div', 'loc-detail-name', name.toUpperCase()));

    var typeStr = (type === 'town' ? 'Town' : 'Wild') + ' · Level ' + lvMin + '-' + lvMax;
    detail.appendChild(txt('div', 'loc-detail-type', typeStr));
    detail.appendChild(txt('div', 'loc-detail-desc', desc));
    body.appendChild(detail);

    // Agents at location
    var agentsHere = (state.data.agents || []).filter(function(a) {
      return a.location_id === locId && a.status !== 'dead';
    });

    body.appendChild(txt('div', 'detail-section-label', 'AGENTS HERE'));
    if (agentsHere.length) {
      agentsHere.forEach(function(agent) {
        body.appendChild(buildAgentCard(agent));
      });
    } else {
      body.appendChild(txt('div', 'empty-msg', '(none)'));
    }

    // Monsters
    var monsters = (locData && locData.monsters) || [];
    body.appendChild(txt('div', 'detail-section-label', 'MONSTERS'));
    if (monsters.length) {
      monsters.forEach(function(m, i) {
        var item = el('div', 'monster-item');
        var prefix = i === monsters.length - 1 ? '\u2514' : '\u251C';
        item.appendChild(txt('span', 'monster-prefix', prefix));
        item.appendChild(txt('span', 'monster-name', m.name || 'Unknown'));
        item.appendChild(txt('span', 'monster-lv', 'Lv.' + (m.level || 1)));

        var hp    = m.hp    || 0;
        var maxHp = m.max_hp|| 1;
        var pct   = Math.round((hp / maxHp) * 100);
        var damaged = hp < maxHp;

        var hpBg = el('div', 'monster-hp-bg');
        var hpFill = el('div', 'monster-hp-fill' + (damaged ? ' damaged' : ''));
        hpFill.style.width = pct + '%';
        hpBg.appendChild(hpFill);
        item.appendChild(hpBg);
        item.appendChild(txt('span', 'monster-hp-txt', hp + '/' + maxHp));
        body.appendChild(item);
      });
    } else {
      body.appendChild(txt('div', 'empty-msg', '(none)'));
    }

    // Exits
    var connIds = (locData && locData.connected_to) || LOC_CONNECTIONS[locId] || [];
    body.appendChild(txt('div', 'detail-section-label', 'EXITS'));
    if (connIds.length) {
      connIds.forEach(function(connId) {
        var connMeta = LOC_META[connId] || {};
        var connLocData = null;
        (state.data.locations || []).forEach(function(l) {
          if (l.id === connId) connLocData = l;
        });
        var connName = (connLocData && connLocData.name) || connMeta.name || connId;
        var connType = (connLocData && connLocData.type) || connMeta.type || 'wild';
        var connMin  = (connLocData && connLocData.level_min) || connMeta.level_min || 1;
        var connMax  = (connLocData && connLocData.level_max) || connMeta.level_max || 5;

        var exitEl = el('div', 'exit-item');
        exitEl.appendChild(txt('span', 'exit-arrow', '\u2192'));

        var nameSpan = el('span');
        nameSpan.style.color = connType === 'town' ? 'var(--blue)' : 'var(--orange)';
        nameSpan.textContent = connName;
        exitEl.appendChild(nameSpan);

        var typeSpan = txt('span', 'exit-type', '(' + connType + ', Lv.' + connMin + '-' + connMax + ')');
        exitEl.appendChild(typeSpan);

        exitEl.addEventListener('click', function() { selectLocation(connId); });
        body.appendChild(exitEl);
      });
    } else {
      body.appendChild(txt('div', 'empty-msg', '(no exits)'));
    }
  }

  /* ── Event Feed ── */
  function updateFeed(events) {
    if (!events || !events.length) return;

    var list = document.getElementById('feedList');
    var newEvents = [];

    events.forEach(function(ev) {
      var evKey = (ev.timestamp || '') + '|' + (ev.message || '') + '|' + (ev.event_type || '');
      if (!state.knownEventIds.has(evKey)) {
        state.knownEventIds.add(evKey);
        newEvents.push(ev);
      }
    });

    // Keep set from growing too large
    if (state.knownEventIds.size > 500) {
      var arr = Array.from(state.knownEventIds);
      arr.splice(0, arr.length - 300);
      state.knownEventIds = new Set(arr);
    }

    newEvents.forEach(function(ev) {
      var row = el('div', 'feed-row new-event');

      var ts = ev.timestamp || '';
      var timePart = ts.length > 8 ? ts.slice(-8) : ts;
      row.appendChild(txt('span', 'feed-time', timePart));

      var evType = (ev.event_type || 'default').toLowerCase();
      var badgeClass = 'feed-badge badge-' + (
        ['combat','loot','move','death','levelup','trade'].indexOf(evType) >= 0 ? evType : 'default'
      );
      row.appendChild(txt('span', badgeClass, evType.toUpperCase()));
      row.appendChild(txt('span', 'feed-msg', ev.message || ''));

      list.insertBefore(row, list.firstChild);
    });

    // Trim old rows
    while (list.children.length > 50) {
      list.removeChild(list.lastChild);
    }
  }

  /* ── Full render ── */
  function render() {
    if (!state.data) return;
    var d = state.data;

    updateStats(d.world_stats || {});
    updateMapNodes(d.locations, d.agents);
    updateFeed(d.recent_events);

    if (state.selectedLocation) {
      showLocationDetail(state.selectedLocation);
    } else {
      renderAgentList();
    }
  }

  /* ── Fetch ── */
  function fetchDashboard() {
    fetch(API_URL)
      .then(function(resp) {
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        return resp.json();
      })
      .then(function(json) {
        if (!json.ok) throw new Error(json.error || 'API error');
        state.tick++;
        state.data = json.data;
        document.getElementById('tickNum').textContent = state.tick;
        render();
      })
      .catch(function(err) {
        console.error('[AgentForge] Fetch failed:', err.message);
        state.tick++;
        document.getElementById('tickNum').textContent = state.tick;
        if (!state.data) {
          document.getElementById('statAgents').textContent   = '—';
          document.getElementById('statMonsters').textContent = '—';
          document.getElementById('statKills').textContent    = '—';
          document.getElementById('statHighLv').textContent   = '—';
        }
      });
  }

  /* ── Back link ── */
  document.getElementById('backLink').addEventListener('click', function() {
    if (state.selectedLocation) {
      var prev = document.getElementById('circle-' + state.selectedLocation);
      if (prev) {
        prev.classList.remove('selected');
        prev.style.strokeWidth = '1.5';
        prev.style.fill = '#0a0e14';
      }
    }
    state.selectedLocation = null;
    showAgentList();
  });

  /* ── Boot ── */
  initMapClicks();
  fetchDashboard();
  setInterval(fetchDashboard, POLL_MS);
</script>
</body>
</html>
